[build]
  command = "npm run build"

[build.environment]
  BACKEND_API_URL = "https://tripzenbackend.onrender.com"
  NEXT_PUBLIC_BACKEND_API_URL = "https://tripzenbackend.onrender.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Fallback proxy — forwards /api/* to Render if Next.js functions aren't available
[[redirects]]
  from = "/api/auth/signup"
  to = "https://tripzenbackend.onrender.com/api/auth/register"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://tripzenbackend.onrender.com/api/:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
